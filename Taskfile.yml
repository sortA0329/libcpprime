version: "3"

tasks:
  configure:gcc:
    desc: Configure GCC build (Ninja)
    cmds:
      - cmake -S . -B build-gcc -G "Ninja" -DLIBCPPRIME_COMPILER=gcc -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - cp build-gcc/compile_commands.json .

  configure:clang:
    desc: Configure Clang build (Ninja)
    cmds:
      - cmake -S . -B build-clang -G "Ninja" -DLIBCPPRIME_COMPILER=clang -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - cp build-clang/compile_commands.json .

  configure:clang-cl:
    desc: Configure clang-cl build (Ninja)
    cmds:
      - cmake -S . -B build-clang-cl -G "Ninja" -DLIBCPPRIME_COMPILER=clang-cl

  configure:msvc:
    desc: Configure MSVC build (Visual Studio 17 2022)
    cmds:
      - cmake -S . -B build-msvc -G "Visual Studio 17 2022" -DLIBCPPRIME_COMPILER=msvc

  clean:gcc:
    desc: Clean GCC build directory
    cmds:
      - rm -rf build-gcc

  clean:clang:
    desc: Clean Clang build directory
    cmds:
      - rm -rf build-clang

  clean:clang-cl:
    desc: Clean clang-cl build directory
    cmds:
      - rm -rf build-clang-cl

  clean:msvc:
    desc: Clean MSVC build directory
    cmds:
      - rm -rf build-msvc

  test:gcc:
    desc: Build and run tests (GCC)
    deps: [configure:gcc]
    cmds:
      - cmake --build build-gcc --parallel --config Release --target libcpprime_tests
      - ctest --test-dir build-gcc -C Release --output-on-failure --stop-on-failure

  test:clang:
    desc: Build and run tests (Clang)
    deps: [configure:clang]
    cmds:
      - cmake --build build-clang --parallel --config Release --target libcpprime_tests
      - ctest --test-dir build-clang -C Release --output-on-failure --stop-on-failure

  test:clang-cl:
    desc: Build and run tests (clang-cl)
    deps: [configure:clang-cl]
    cmds:
      - cmake --build build-clang-cl --parallel --config Release --target libcpprime_tests
      - ctest --test-dir build-clang-cl -C Release --output-on-failure --stop-on-failure

  test:msvc:
    desc: Build and run tests (MSVC)
    deps: [configure:msvc]
    cmds:
      - cmake --build build-msvc --parallel --config Release --target libcpprime_tests
      - ctest --test-dir build-msvc -C Release --output-on-failure --stop-on-failure

  bench:gcc:
    desc: Build and run benchmark, then plot (GCC)
    deps: [configure:gcc]
    cmds:
      - cmake --build build-gcc --parallel --config Release --target benchmark_isprime
      - ./build-gcc/benchmark_isprime
      - uv run benchmarks/plot_isprime.py

  bench:clang:
    desc: Build and run benchmark, then plot (Clang)
    deps: [configure:clang]
    cmds:
      - cmake --build build-clang --parallel --config Release --target benchmark_isprime
      - ./build-clang/benchmark_isprime
      - uv run benchmarks/plot_isprime.py

  bench:clang-cl:
    desc: Build and run benchmark, then plot (clang-cl)
    deps: [configure:clang-cl]
    cmds:
      - cmake --build build-clang-cl --parallel --config Release --target benchmark_isprime
      - ./build-clang-cl/benchmark_isprime
      - uv run benchmarks/plot_isprime.py

  bench:msvc:
    desc: Build and run benchmark, then plot (MSVC)
    deps: [configure:msvc]
    cmds:
      - cmake --build build-msvc --parallel --config Release --target benchmark_isprime
      - ./build-msvc/Release/benchmark_isprime.exe
      - uv run benchmarks/plot_isprime.py

  bench-heavy:gcc:
    desc: Build and run benchmark, then plot (GCC)
    deps: [configure:gcc]
    cmds:
      - cmake --build build-gcc --parallel --config Release --target benchmark_isprime
      - ./build-gcc/benchmark_isprime --heavy
      - uv run benchmarks/plot_isprime.py

  bench-heavy:clang:
    desc: Build and run benchmark, then plot (Clang)
    deps: [configure:clang]
    cmds:
      - cmake --build build-clang --parallel --config Release --target benchmark_isprime
      - ./build-clang/benchmark_isprime --heavy
      - uv run benchmarks/plot_isprime.py

  bench-heavy:clang-cl:
    desc: Build and run benchmark, then plot (clang-cl)
    deps: [configure:clang-cl]
    cmds:
      - cmake --build build-clang-cl --parallel --config Release --target benchmark_isprime
      - ./build-clang-cl/benchmark_isprime --heavy
      - uv run benchmarks/plot_isprime.py

  bench-heavy:msvc:
    desc: Build and run benchmark, then plot (MSVC)
    deps: [configure:msvc]
    cmds:
      - cmake --build build-msvc --parallel --config Release --target benchmark_isprime
      - ./build-msvc/Release/benchmark_isprime.exe --heavy
      - uv run benchmarks/plot_isprime.py

  # Convenience aggregates
  configure:
    desc: Configure builds for GCC, Clang, and MSVC
    cmds:
      - task: configure:gcc
      - task: configure:clang
      - task: configure:clang-cl
      - task: configure:msvc

  clean:
    desc: Clean build directories for GCC, Clang, and MSVC
    cmds:
      - task: clean:gcc
      - task: clean:clang
      - task: clean:clang-cl
      - task: clean:msvc

  test:
    desc: Run tests for GCC, Clang, clang-cl, and MSVC
    cmds:
      - task: test:gcc
      - task: test:clang
      - task: test:clang-cl
      - task: test:msvc

  bench:
    desc: Run benchmarks for GCC, Clang, clang-cl, and MSVC
    cmds:
      - task: bench:gcc
      - task: bench:clang
      - task: bench:clang-cl
      - task: bench:msvc

  bundle:
    desc: Create bundled distribution
    cmds:
      - uv run bundled/create_bundled.py

  default:
    desc: List available tasks
    cmds:
      - task --list
