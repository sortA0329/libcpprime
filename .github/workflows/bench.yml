name: Benchmark

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: benchmark-pages
  cancel-in-progress: false

jobs:
  linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            build_dir: build-gcc
          - compiler: clang
            build_dir: build-clang
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build ccache clang

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: ${{ matrix.build_dir }}/_deps
          key: ${{ runner.os }}-${{ matrix.compiler }}-deps-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-deps-

      - name: Run benchmark via task
        run: task bench-heavy:${{ matrix.compiler }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ runner.os }}-${{ matrix.compiler }}
          if-no-files-found: warn
          path: |
            benchmarks/bench_summary.md
            benchmarks/bench_IsPrime.jpg
            benchmarks/bench_IsPrimeNoTable.jpg
            benchmarks/bench_summary.jpg

  windows:
    name: Windows (${{ matrix.compiler }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: msvc
            build_dir: build-msvc
          - compiler: clang-cl
            build_dir: build-clang-cl
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM + Ninja (clang-cl)
        if: matrix.compiler == 'clang-cl'
        shell: pwsh
        run: |
          choco install llvm ninja -y --no-progress

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: ${{ matrix.build_dir }}/_deps
          key: ${{ runner.os }}-${{ matrix.compiler }}-deps-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.compiler }}-deps-

      - name: Run benchmark via task
        run: task bench-heavy:${{ matrix.compiler }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ runner.os }}-${{ matrix.compiler }}
          if-no-files-found: warn
          path: |
            benchmarks/bench_summary.md
            benchmarks/bench_IsPrime.jpg
            benchmarks/bench_IsPrimeNoTable.jpg
            benchmarks/bench_summary.jpg

  publish-pages:
    name: Publish benchmark results to GitHub Pages
    runs-on: ubuntu-latest
    needs: [linux, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: benchmark-*

      - name: Prepare Pages content
        run: >-
          python3 scripts/publish_benchmarks_to_pages.py
          --artifacts-dir artifacts
          --site-dir site
          --repo "${{ github.repository }}"
          --run-id "${{ github.run_id }}"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: true
          commit_message: "chore(bench): publish run ${{ github.run_id }}"
